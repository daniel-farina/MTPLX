name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build, such as v0.1.0-preview"
        required: true
        default: "v0.1.0-preview"
      publish_to_pypi:
        description: "Publish the built artifacts to PyPI through Trusted Publishing"
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: scripts/fresh_venv_smoke.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi) || (github.event_name == 'push' && vars.ENABLE_PYPI_PUBLISH == 'true') }}
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mtplx
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@v1.13.0
